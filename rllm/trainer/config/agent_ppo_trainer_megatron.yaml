# Megatron configuration for agent PPO training
# This config extends agent_ppo_trainer with Megatron-specific settings

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_megatron_trainer  # Load base ppo_megatron_trainer which has proper megatron configs
  - _self_

actor_rollout_ref:
  rollout:
    mode: async # only async is supported
    agent:
      num_workers: 0 # we bypass the agent loop
    val_kwargs:
      do_sample: True # if do_sample is False, temperature is overridden to 0.0

data:
  gen_batch_size: ${mul:${data.train_batch_size},${rllm.rejection_sample.multiplier}}
  return_multi_modal_inputs: False

rllm:
  agent:
    name: math_agent
    max_steps: 20
    trajectory_timeout: null
    overlong_filter: False
    agent_args: {}
    engine_args: {}
  env:
    name: custom
    env_args: {}
  workflow:
    use_workflow: False
    name: single_turn_workflow
    workflow_args:
      max_prompt_length: ${data.max_prompt_length}
      max_response_length: ${data.max_response_length}
      timeout: 1e6
      gamma: 0.0 # no discounting
      reward_bonus_coeff: 0.0 # no reward shaping
      accumulate_response_length: null # defaults to not rllm.stepwise_advantage.enable
    n_parallel_tasks: 256
    retry_limit: 3
  disable_thinking: False
  accumulate_reasoning: False
  mask_truncated_samples: False
  filter_token_mismatch: True
  stepwise_advantage:
    enable: False
    mode: broadcast # [broadcast, per_step]
    normalize_by_steps: False
  compact_filtering:
    enable: False
    mask_max_prompt_length_exceeded: True
    mask_max_response_length_exceeded: True
    mask_env_done: False
    mask_max_turns_exceeded: True
    mask_timeout: True
    mask_unknown: False
    mask_error: True
  rejection_sample:
    enable: False
    multiplier: 1
  distill:
    enable: False
    shared_tokenizer: False
    teacher_rollout_args:
      model: "default"
      base_url: "http://localhost:8000/v1"
      api_key: "EMPTY"
      max_prompt_length: 32768
  sdk:
    store:
      path: ~/.rllm/traces.db
    processing:
      groupby_key: null
      traj_name_key: null
    proxy:
      host: 127.0.0.1
      port: 4000
      mode: subprocess  # external | subprocess
      admin_token: my-shared-secret

fireworks:
  deployment_id: null
  model_id_prefix: test-model
  concurrency: 32
  return_token_ids: True

trainer:
  log_episodes: false
  episode_log_dir: logs/${trainer.project_name}/${trainer.experiment_name}


# Kernel specific reward model configuration
reward_model:
  max_turns: 3
  reference_backend: triton
  reward_manager: kernel
  server_url: "http://127.0.0.1:8002"
  reward_func_name: "calculate_reward_weighted"
  init_correct_weight: 0.5
  init_performance_weight: 0.5
  speedup_eps: 0.01
  enhanced: true
  rate_limit: 64                  # 令牌桶并发上限（全局）
  acquire_timeout: 2400             # 获取令牌等待超时（秒），超过则放弃提交 240 default
  max_concurrent: 64              # Ray 执行池 worker 并发（建议 >= rate_limit）
  print_status: true             # 是否打印每个评测样本的状态
  speedup_reward_upper_bound: 3.0      # 加速奖励上限
  speedup_reward_lower_bound: 0.0      # 加速奖励下限
  reward_policy:
    penalties:
      penalty_score: 0.0
      compilation_fail: -0.5     # 编译失败惩罚
      correctness_fail: -0.3     # 正确性失败惩罚
      perf_degrade: -0.1         # speedup < 1.0 的惩罚
  reward_weights:
    compilation: 0.3
    correctness: 0.4
    performance: 0.3
  timeout: 1800  # 180 default
  max_retries: 3
  task_timeout: 600  # 180 default
  task_timeout_in_client: 1800  # 180 default
  num_perf_trials: 100
  num_correct_trials: 5
  enable_profiling: true
  verbose_errors: true
  coverage_reward:
    reward_type: "time_coverage"  # time_coverage: cutom_kernel_time_us / total_kernel_time_us, number_coverage: num_custom_kernel / num_total_kernels
    enable: false
    weight: 0.25
  detect_decoy_kernel: true