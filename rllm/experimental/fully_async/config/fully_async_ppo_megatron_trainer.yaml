hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_megatron_trainer
  - _self_

# verl.experimental.separation.utils.create_role_worker_mapping requires this
# when ENABLE_FULLY_ASYNC is set (see verl fully_async_ppo_* configs).
trainer:
  use_legacy_worker_impl: disable

# Override hybrid_engine: fully-async uses separate rollout processes
actor_rollout_ref:
  hybrid_engine: False

  rollout:
    checkpoint_engine:
      backend: nccl
      update_weights_bucket_megabytes: 2048
      engine_kwargs: {}

  actor:
    use_rollout_log_probs: ${oc.select:async_training.use_rollout_log_probs, True}

async_training:

  # Maximum samples staleness threshold
  staleness_threshold: 0.1

  # Frequency of parameter synchronization between rollouter and trainer,
  # One step means trainer obtains a batch of required samples
  trigger_parameter_sync_step: 4

  # The number of ppo_mini_batches that the FullyAsyncTrainer obtains once
  require_batches: 1

  required_samples: 128

  # When synchronizing parameters, whether to interrupt rollouter and perform partial rollout
  partial_rollout: True

  # Whether to use rollout log probs for training
  use_rollout_log_probs: True

  # compute_prox_log_prob
  compute_prox_log_prob: False

  # whether to use trainer do_validate
  use_trainer_do_validate: False

# Rollout config (separate from actor, not hybrid)
rollout:

  # Number of nodes used in the rollout
  nnodes: 1

  # Number of GPUs per node
  n_gpus_per_node: 8

  # number of responses (i.e. num sample times). > 1 for grpo
  n: 4

  # total rollout samples
  total_rollout_steps: 100

  # Number of epochs in training
  total_epochs: 10

  # Test frequency, how many times a parameter update triggers a validation
  test_freq: 1

  rejection_sample: False

data:
  # Number of samples generated, currently only support 1
  gen_batch_size: 1

  # DatasetRegistry datasets/splits (explicit; validation is optional)
  train_dataset_name: null
  train_split: train
  val_dataset_name: null
  val_split: test

# KernelGYM (fully-async / examples.kernelgym.train_kernelgym_fully_async) — used via ``config.kernel``
# Hydra: ``++kernel.server_url=...`` etc.
kernel:
  server_url: http://localhost:8000
  max_turns: 3
  timeout: 300
  task_timeout_in_client: 600
  num_correct_trials: 5
  num_perf_trials: 100
  toolkit: kernelbench
  backend_adapter: kernelbench
  backend: cuda
  reference_backend: null
  max_retries: 3
  rate_limit: 8
  acquire_timeout: 120
  reward_func_name: calculate_reward_like_kernel
  is_valid: true
  detect_decoy_kernel: true
  enable_profiling: true
  verbose_errors: true
  workflow: kernelbench
  rerun_on_anomaly_speedup: true
  reward_config: {}
  # Whether to stop the multi-turn loop as soon as the kernel compiles and is
  # correct.  Set to false for speedup-based rewards (calculate_reward_speedup /
  # calculate_reward_weighted) so the agent can continue to improve performance.
  early_exit_on_correct: false
