name: "agent-python-cann"
description: "Isolated Python + Ascend CANN env for agent training, without /proc"

mode: ONCE
hostname: "agentbox"
cwd: "/root"

# 若你的nsjail版本支持，可保留为true
clone_newns: true
clone_newuts: true
clone_newipc: true
clone_newnet: true
clone_newpid: true
clone_newcgroup: true
clone_newuser: true

# user_net { }

# 不挂载 /proc
mount_proc: false

# 用户映射
uidmap {
  inside_id: "0"
  outside_id: ""
  count: 1
}
gidmap {
  inside_id: "0"
  outside_id: ""
  count: 1
}

# # 资源限制，可按需调整
# rlimit_as: 8589934592         # 8 GiB
# rlimit_cpu: 0                 # 0通常表示不限制，按版本行为确认
# rlimit_fsize: 1073741824      # 1 GiB
# rlimit_nofile: 4096
# rlimit_nproc: 256
# rlimit_stack: 268435456       # 256 MiB
# time_limit: 0

# # 环境变量：尽量显式指定，避免探测宿主环境
# envar: "HOME=/work"
# envar: "USER=agent"
# envar: "LOGNAME=agent"
# envar: "PATH=/usr/local/python/bin:/usr/local/Ascend/ascend-toolkit/latest/bin:/usr/bin:/bin"
# envar: "LD_LIBRARY_PATH=/usr/local/python/lib:/usr/local/python/lib/python3.10/lib-dynload:/usr/local/Ascend/ascend-toolkit/latest/lib64:/usr/local/Ascend/driver/lib64:/lib:/lib64:/usr/lib:/usr/lib64"
# envar: "PYTHONHOME=/usr/local/python"
# envar: "PYTHONPATH=/usr/local/python/lib/python3.10:/usr/local/python/lib/python3.10/site-packages"
# envar: "TMPDIR=/tmp"

# # CANN 相关，按实际安装路径调整
# envar: "ASCEND_HOME_PATH=/usr/local/Ascend"
# envar: "ASCEND_TOOLKIT_HOME=/usr/local/Ascend/ascend-toolkit/latest"
# envar: "ASCEND_AICPU_PATH=/usr/local/Ascend"
# envar: "ASCEND_OPP_PATH=/usr/local/Ascend/ascend-toolkit/latest/opp"
# envar: "TOOLCHAIN_HOME=/usr/local/Ascend/ascend-toolkit/latest/toolkit"

# # 可选：限制locale依赖
envar: "LANG=C.UTF-8"
envar: "LC_ALL=C.UTF-8"

# # 保留最小能力集。通常全部去掉更安全
# keep_caps: false

# 必需挂载点
mount {
  src: "/root/sandbox-rootfs/"
  dst: "/"
  is_bind: true
  rw: true
}


# tmp可写
mount {
  src: "/root/sandbox-rootfs//tmp"
  dst: "/tmp"
  is_bind: true
  rw: true
}

# /dev 最小设备
mount {
  src: "/dev/null"
  dst: "/dev/null"
  is_bind: true
  rw: true
}
mount {
  src: "/dev/zero"
  dst: "/dev/zero"
  is_bind: true
  rw: true
}
mount {
  src: "/dev/random"
  dst: "/dev/random"
  is_bind: true
  rw: true
}
mount {
  src: "/dev/urandom"
  dst: "/dev/urandom"
  is_bind: true
  rw: true
}

# 如果需要终端输出
mount {
  src: "/dev/tty"
  dst: "/dev/tty"
  is_bind: true
  rw: true
  mandatory: false
}

# 若训练要访问 Ascend 设备，必须把相关设备节点映射进去
# 下面只是示意，具体设备名要以你的宿主机为准
mount {
  src: "/dev/davinci4"
  dst: "/dev/davinci4"
  is_bind: true
  rw: true
  mandatory: false
}
mount {
  src: "/dev/davinci_manager"
  dst: "/dev/davinci_manager"
  is_bind: true
  rw: true
  mandatory: false
}
mount {
  src: "/dev/devmm_svm"
  dst: "/dev/devmm_svm"
  is_bind: true
  rw: true
  mandatory: false
}
mount {
  src: "/dev/hisi_hdc"
  dst: "/dev/hisi_hdc"
  is_bind: true
  rw: true
  mandatory: false
}

# 有些环境可能还需要这些
mount {
  src: "/etc/resolv.conf"
  dst: "/etc/resolv.conf"
  is_bind: true
  rw: false
  mandatory: false
}
mount {
  src: "/etc/hosts"
  dst: "/etc/hosts"
  is_bind: true
  rw: false
  mandatory: false
}
mount {
  src: "/etc/nsswitch.conf"
  dst: "/etc/nsswitch.conf"
  is_bind: true
  rw: false
  mandatory: false
}

# 执行命令示例
exec_bin {
  path: "/usr/bin/bash"
  # arg: "/usr/local/python/bin/python3"
  # arg: "/work/train.py"
}