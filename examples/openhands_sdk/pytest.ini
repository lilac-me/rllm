[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    unit: Fast, pure-Python unit tests (no I/O)
    e2e: End-to-end tests that start a real HTTP server

# Timeout: prevent hanging tests from blocking CI
# Requires pytest-timeout: pip install pytest-timeout
# timeout = 30
