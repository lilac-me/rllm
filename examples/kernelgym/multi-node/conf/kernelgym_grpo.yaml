env:
  FORCE_BUILD: "0"
  VLLM_USE_V1: "1"
  VLLM_ATTENTION_BACKEND: "TORCH_SDPA"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_ENGINE_ITERATION_TIMEOUT_S: "100000000000"
  VLLM_ASCEND_ENABLE_NZ: "0"

  RAY_DEBUG_POST_MORTEM: "0"

  PYTORCH_NPU_ALLOC_CONF: "max_split_size_mb:512"
  # TASK_QUEUE_ENABLE: "2"

  TOKENIZERS_PARALLELISM: "true"
  VLLM_LOGGING_LEVEL: "WARN"
  RAY_DEDUP_LOGS: "1"
  HYDRA_FULL_ERROR: "1"

  HCCL_EXEC_TIMEOUT: "7200"
  HCCL_EVENT_TIMEOUT: "7200"
  HCCL_CONNECT_TIMEOUT: "7200"
  ACL_DEVICE_SYNC_TIMEOUT: "7200"
  HCCL_ASYNC_ERROR_HANDLING: "0"
  P2P_HCCL_BUFFSIZE: "30"
  HCCL_BUFFSIZE: "300"
  HCCL_HOST_SOCKET_PORT_RANGE: "60000-60500"
  HCCL_NPU_SOCKET_PORT_RANGE: "61000-61500"
  HCCL_INTRA_ROCE_ENABLE: "1"

  GLOO_SOCKET_TIMEOUT: "7200"

  RAY_ENABLE_RECORD_ACTOR_TASK_LOGGING: 1

args:
  # =========================
  # algorithm
  # =========================
  algorithm.adv_estimator: grpo
  algorithm.kl_ctrl.kl_coef: 0.001

  # =========================
  # data
  # =========================
  data.train_batch_size: 8
  data.val_batch_size: 16
  data.max_prompt_length: 16384
  data.max_response_length: 16384

  # =========================
  # actor_rollout_ref - common
  # =========================
  actor_rollout_ref.hybrid_engine: true
  actor_rollout_ref.model.path: /root/cszhou_sft_weight/global_step_100
  actor_rollout_ref.model.use_remove_padding: true
  actor_rollout_ref.model.enable_gradient_checkpointing: true

  # =========================
  # actor - optimization / PPO
  # =========================
  actor_rollout_ref.actor.optim.lr: 1e-6
  actor_rollout_ref.actor.loss_agg_mode: seq-mean-token-mean
  actor_rollout_ref.actor.ppo_mini_batch_size: 2
  actor_rollout_ref.actor.use_dynamic_bsz: true
  actor_rollout_ref.actor.ppo_max_token_len_per_gpu: 32768
  actor_rollout_ref.actor.use_kl_loss: false
  actor_rollout_ref.actor.kl_loss_coef: 0.001
  actor_rollout_ref.actor.kl_loss_type: low_var_kl
  actor_rollout_ref.actor.entropy_coeff: 0.0
  actor_rollout_ref.actor.clip_ratio_low: 0.2
  actor_rollout_ref.actor.clip_ratio_high: 0.28

  # =========================
  # actor.megatron
  # =========================
  actor_rollout_ref.actor.strategy: megatron
  actor_rollout_ref.actor.megatron.use_mbridge: true
  actor_rollout_ref.actor.megatron.use_dist_checkpointing: false

  actor_rollout_ref.actor.megatron.param_offload: true
  actor_rollout_ref.actor.megatron.grad_offload: true

  actor_rollout_ref.actor.megatron.tensor_model_parallel_size: 4
  actor_rollout_ref.actor.megatron.pipeline_model_parallel_size: 1
  actor_rollout_ref.actor.megatron.context_parallel_size: 8
  actor_rollout_ref.actor.megatron.expert_model_parallel_size: 8
  actor_rollout_ref.actor.megatron.expert_tensor_parallel_size: 1

  +actor_rollout_ref.actor.megatron.override_transformer_config.context_parallel_size: 8
  +actor_rollout_ref.actor.megatron.override_transformer_config.use_flash_attn: true
  +actor_rollout_ref.actor.megatron.override_transformer_config.recompute_method: uniform
  +actor_rollout_ref.actor.megatron.override_transformer_config.recompute_granularity: full
  +actor_rollout_ref.actor.megatron.override_transformer_config.recompute_num_layers: 1
  +actor_rollout_ref.actor.checkpoint.save_contents: "['model']"

  # =========================
  # actor optimizer override
  # =========================
  +actor_rollout_ref.actor.optim.override_optimizer_config.optimizer_offload_fraction: 1
  +actor_rollout_ref.actor.optim.override_optimizer_config.use_precision_aware_optimizer: true
  +actor_rollout_ref.actor.optim.override_optimizer_config.optimizer_cpu_offload: true

  # =========================
  # ref
  # =========================
  actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu: 1
  actor_rollout_ref.ref.log_prob_use_dynamic_bsz: true
  actor_rollout_ref.ref.log_prob_max_token_len_per_gpu: 32768

  actor_rollout_ref.ref.megatron.tensor_model_parallel_size: 4
  actor_rollout_ref.ref.megatron.pipeline_model_parallel_size: 1
  actor_rollout_ref.ref.megatron.context_parallel_size: 8
  actor_rollout_ref.ref.megatron.expert_model_parallel_size: 8
  actor_rollout_ref.ref.megatron.expert_tensor_parallel_size: 1
  actor_rollout_ref.ref.megatron.param_offload: true
  actor_rollout_ref.ref.megatron.use_mbridge: true
  actor_rollout_ref.ref.megatron.use_dist_checkpointing: false

  # =========================
  # rollout
  # =========================
  actor_rollout_ref.rollout.tensor_model_parallel_size: 2
  actor_rollout_ref.rollout.name: vllm
  actor_rollout_ref.rollout.mode: async
  actor_rollout_ref.rollout.enforce_eager: false
  actor_rollout_ref.rollout.temperature: 1.0
  actor_rollout_ref.rollout.top_p: 1.0
  actor_rollout_ref.rollout.gpu_memory_utilization: 0.8
  actor_rollout_ref.rollout.max_model_len: 98304
  actor_rollout_ref.rollout.n: 8
  actor_rollout_ref.rollout.val_kwargs.n: 4
  actor_rollout_ref.rollout.val_kwargs.temperature: 0.0
  actor_rollout_ref.rollout.val_kwargs.top_p: 1.0
  actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu: 1
  ++actor_rollout_ref.rollout.checkpoint_engine.update_weights_bucket_megabytes: 4096

  # =========================
  # rllm
  # =========================
  rllm.mask_truncated_samples: false
  +rllm.agent.engine_args.n_parallel_agents: 64
  rllm.agent.max_steps: 5
  rllm.stepwise_advantage.enable: false

  # =========================
  # trainer
  # =========================
  trainer.critic_warmup: 0
  trainer.logger: "[console,wandb]"
  trainer.project_name: rllm-agent
  trainer.experiment_name: kernelgym-qwen30b
  trainer.val_before_train: false
  trainer.device: npu
  trainer.save_freq: 5
  trainer.test_freq: 20
  trainer.default_hdfs_dir: null
  trainer.total_epochs: 100

  # =========================
  # reward_model
  # =========================
  reward_model.max_turns: 3
  reward_model.reference_backend: triton
  reward_model.reward_func_name: calculate_reward_weighted
  reward_model.init_correct_weight: 0.5
  reward_model.init_performance_weight: 0.5

  reward_model.speedup_reward_upper_bound: 3.0
  reward_model.speedup_reward_lower_bound: 0.0

  reward_model.reward_policy.penalties.penalty_score: 0.0
  reward_model.reward_policy.penalties.compilation_fail: -0.5
  reward_model.reward_policy.penalties.correctness_fail: -0.3
  reward_model.reward_policy.penalties.perf_degrade: -0.1

  reward_model.timeout: 1800
  reward_model.max_retries: 3
  reward_model.task_timeout: 600
  reward_model.task_timeout_in_client: 1800
  reward_model.num_perf_trials: 100
  reward_model.num_correct_trials: 5
  reward_model.enable_profiling: true
  reward_model.verbose_errors: true

  reward_model.reward_weights.compilation: 0.3
  reward_model.reward_weights.correctness: 0.4
  reward_model.reward_weights.performance: 0.3

  reward_model.coverage_reward.reward_type: time_coverage
  reward_model.coverage_reward.enable: false
  reward_model.coverage_reward.weight: 0.25